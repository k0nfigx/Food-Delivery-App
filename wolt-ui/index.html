<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <button id="mobile-menu-toggle" class="mobile-menu-toggle" type="button" aria-expanded="false" aria-controls="header-actions" aria-label="Open menu">☰</button>

    <div class="brand-block">
      <a href="index.html" class="brand-logo" aria-label="Fresh home">
        <span class="brand-logo-letter" aria-hidden="true">F</span>
      </a>

      <div class="brand-copy">
        <p class="eyebrow">Fresh picks</p>
        <h1>Food discovery</h1>
      </div>

      <div class="brand-quick-actions">
        <label class="header-address-field" for="header-address">
          <span>Delivery address</span>
          <input id="header-address" type="text" placeholder="Enter your address" />
        </label>
        <button id="map-toggle" class="ghost-btn map-toggle" type="button">Map</button>
        <div id="location-dropdown" class="location-dropdown" aria-hidden="true">
          <div class="location-card">
            <div>
              <p class="eyebrow">Find your spot</p>
              <h3>Search or pin your address</h3>
              <p class="location-copy">Search for a place, then click the map to place a pin and save it.</p>
            </div>
            <label class="location-search">
              <span>Search address</span>
              <input id="map-search" type="text" placeholder="Type a street, city, or postcode" />
            </label>
            <div id="map-surface" class="map-surface" title="Click to place a pin">
              <div class="map-grid"></div>
              <div id="map-pin" class="map-pin">📍</div>
              <span id="map-label" class="map-label">Tap to place a pin</span>
            </div>
            <div class="location-actions">
              <button id="apply-location" class="btn" type="button">Use this address</button>
              <button id="close-location" class="ghost-btn" type="button">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="header-actions" class="header-actions">
      <nav class="topnav">
        <a href="index.html">Home</a>
        <a href="index.html?page=cart">Cart <span id="cart-count">0</span></a>
      </nav>
      <button id="login-btn" class="login-btn" type="button">Log in</button>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <div id="login-modal" class="login-modal" aria-hidden="true">
    <section class="login-panel" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <button id="close-login" class="icon-btn" type="button" aria-label="Close login panel">×</button>
      <p class="eyebrow">Quick access</p>
      <h2 id="login-title">Welcome back</h2>
      <p class="login-copy">Use any email and password to test the demo sign-in flow.</p>

      <form id="login-form" class="login-form">
        <label>
          Email
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input id="login-password" type="password" placeholder="Enter any password" required />
        </label>
        <p id="login-message" class="login-message" aria-live="polite"></p>
        <button class="btn login-submit" type="submit">Sign in</button>
      </form>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
